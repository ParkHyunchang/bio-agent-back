spring:
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

server:
  port: 3211

# 로깅 설정은 logback-spring.xml 에서 관리 (콘솔 + 파일 동시 출력)

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}

pubmed:
  api:
    # NCBI E-utilities API key. 등록 시 분당 3 → 10 req로 상향. 비워두면 익명 호출.
    key: ${NCBI_API_KEY:}
