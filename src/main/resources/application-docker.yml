spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:172.17.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    show-sql: false

ml:
  service:
    url: http://bio-agent-ml:3212

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  upload:
    max-image-bytes: 10485760  # 10MB per image
    allowed-mime-types: image/png,image/jpeg,image/jpg,image/webp
  ml:
    connect-timeout-ms: 10000
    read-timeout-ms: 180000
  anthropic:
    connect-timeout-ms: 10000
    read-timeout-ms: 180000
  rate-limit:
    chat-per-minute: 30
    window-ms: 60000

# 로깅 설정은 logback-spring.xml 에서 관리 (콘솔 + 파일 동시 출력)
