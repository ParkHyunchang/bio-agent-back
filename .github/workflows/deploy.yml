name: Deploy Backend

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/parkhyunchang/bio-agent-back
  NAS_DEPLOY_PATH: /volume1/docker/bio-agent-back
  CONTAINER_NAME: bio_agent_backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Copy docker-compose.yml to NAS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_SSH_PASSWORD }}
          source: docker-compose.yml
          target: ${{ env.NAS_DEPLOY_PATH }}

      - name: Deploy to NAS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_SSH_PASSWORD }}
          script: |
            cd ${{ env.NAS_DEPLOY_PATH }}

            # ghcr.io 로그인
            echo "${{ secrets.GHCR_PAT }}" | /usr/local/bin/docker login ghcr.io -u parkhyunchang --password-stdin

            # .env 파일에 BACKEND_IMAGE 업데이트 (없으면 추가)
            if [ -f .env ]; then
              if grep -q "^BACKEND_IMAGE=" .env; then
                sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${{ env.IMAGE_NAME }}:latest|" .env
              else
                echo "BACKEND_IMAGE=${{ env.IMAGE_NAME }}:latest" >> .env
              fi
            else
              echo "BACKEND_IMAGE=${{ env.IMAGE_NAME }}:latest" > .env
            fi

            # 최신 이미지 Pull 및 컨테이너 재배포
            /usr/local/bin/docker compose pull backend
            /usr/local/bin/docker compose up -d --no-deps backend

            # 미사용 이미지 정리
            /usr/local/bin/docker image prune -f
